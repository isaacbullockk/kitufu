<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <pattern id="lubugo" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <!-- Diamond shapes inspired by Ugandan barkcloth -->
      <path d="M50 10 L80 35 L50 60 L20 35 Z" fill="none" stroke="#C73E1D" stroke-width="1.5" opacity="0.12"/>
      <path d="M50 40 L80 65 L50 90 L20 65 Z" fill="none" stroke="#FF6B35" stroke-width="1.5" opacity="0.1"/>
      <path d="M10 35 L40 10 L70 35 L40 60 Z" fill="none" stroke="#F5A623" stroke-width="1" opacity="0.08"/>
      <path d="M60 35 L90 10 L100 35 L90 60 Z" fill="none" stroke="#1B4332" stroke-width="1" opacity="0.06"/>
      <!-- Triangle accents -->
      <path d="M30 80 L45 65 L60 80 Z" fill="#2A9D8F" opacity="0.06"/>
      <path d="M70 20 L85 35 L100 20 Z" fill="#E07A5F" opacity="0.05"/>
      <!-- Dot accents -->
      <circle cx="25" cy="25" r="2" fill="#C73E1D" opacity="0.08"/>
      <circle cx="75" cy="75" r="2" fill="#FF6B35" opacity="0.08"/>
      <circle cx="75" cy="25" r="1.5" fill="#F5A623" opacity="0.1"/>
      <circle cx="25" cy="75" r="1.5" fill="#2A9D8F" opacity="0.08"/>
      <!-- Cross lines -->
      <line x1="0" y1="50" x2="100" y2="50" stroke="#1B4332" stroke-width="0.5" opacity="0.04"/>
      <line x1="50" y1="0" x2="50" y2="100" stroke="#1B4332" stroke-width="0.5" opacity="0.04"/>
    </pattern>
  </defs>
  <rect width="400" height="400" fill="url(#lubugo)"/>
</svg>
